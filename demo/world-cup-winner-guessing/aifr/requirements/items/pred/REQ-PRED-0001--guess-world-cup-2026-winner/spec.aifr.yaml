  rules:
    - id: RULE-001
      description: 2026 世界杯参赛队候选池必须包含本需求文档列出的 48 支队伍。
      invariant: world_cup_2026_team_pool.size = 48

    - id: RULE-002
      description: 每个冠军猜测结果必须来自 2026 世界杯参赛队候选池。
      invariant: winner_guess in world_cup_2026_team_pool

    - id: RULE-003
      description: 系统不得返回候选池之外的国家或地区作为冠军猜测。
      invariant: winner_guess not in external_country_pool

    - id: RULE-004
      description: 候选池中的队伍名称归一化后不得重复。
      invariant: all normalize(participant_team) values are unique

    - id: RULE-005
      description: 用户可以重复触发猜测，同一页面会话不要求返回相同队伍。
      invariant: repeated_guess may produce different winner_guess

    - id: RULE-006
      description: 输出结果必须包含娱乐和非投注免责声明。
      invariant: response includes entertainment_disclaimer

    - id: RULE-007
      description: 小组赛必须按 1v2、3v4、1v3、4v2、4v1、2v3 的顺序为每个小组生成 6 场比赛。
      invariant: each group has 6 predicted group_stage_fixture_order matches

    - id: RULE-008
      description: 每场比赛必须生成一个由两个非负整数构成的娱乐性质预测比分。
      invariant: predicted_score = non_negative_integer ":" non_negative_integer

    - id: RULE-009
      description: 系统必须根据小组赛预测比分计算每组积分榜。
      invariant: simulated_standings use points, goal_difference, and goals_for

    - id: RULE-010
      description: 系统必须从小组赛结果选出每组前两名和 8 个成绩最好的小组第三名进入 32 强。
      invariant: round_of_32_qualifiers = group_top_two * 12 plus best_third_place * 8

    - id: RULE-011
      description: 系统必须模拟淘汰赛比分并逐轮淘汰，直到只剩一个冠军。
      invariant: knockout_bracket reduces 32 teams to 1 champion

    - id: RULE-012
      description: 页面必须展示从小组赛到冠军的完整娱乐模拟过程。
      invariant: page shows group_scores, standings, knockout_bracket, and champion

    - id: RULE-013
      description: 页面必须在“重新模拟”按钮左侧提供“同步赛况”按钮。
      invariant: sync_match_results action appears before simulate_tournament action

    - id: RULE-014
      description: 同步赛况必须把已完赛真实结果补充到对应小组赛场次，并覆盖该场原本的预测比分。
      invariant: synced_match_result replaces predicted_score for matching group fixture

    - id: RULE-015
      description: 同步的已完赛场次必须显示北京时间、真实比分和真实赛果标识。
      invariant: synced fixture shows played_at_beijing, final_score, and result_source_label = synced-real

    - id: RULE-016
      description: 同步真实赛果必须参与积分榜、32 强资格和淘汰赛路径计算，未完赛场次继续使用预测比分。
      invariant: standings and knockout_bracket use synced_match_result plus predicted_score for future fixtures

    - id: RULE-017
      description: 淘汰赛 32 强首轮必须按公开赛程槽位填充小组排名和最佳第三名，后续轮次按胜者推进。
      invariant: round_of_32_slots use group placement seeds and winners advance by official match numbers

    - id: RULE-018
      description: 每支参赛队必须有国旗图标映射，并在冠军、积分榜和比赛对阵展示中使用。
      invariant: each participant_team has team_flag_icon and visible team renderers include team_flag_icon

    - id: RULE-019
      description: 标题背景必须低透明度展示 2026 世界杯招贴画，且不能遮挡标题、说明文案或按钮。
      invariant: title_background includes transparent_tournament_poster and foreground_text remains readable

    - id: RULE-020
      description: 项目图标和页面品牌标记必须使用大力神杯风格图标。
      invariant: project_icon = project_trophy_icon and brand_mark = project_trophy_icon

  scenarios:
    - id: SCN-001
      name: 用户点击后获得参赛队范围内的冠军猜测
      given:
        - world_cup_2026_team_pool contains 48 participant teams
        - world_cup_2026_team_pool includes "阿根廷", "巴西", "法国", and "日本"
      when:
        - 用户点击猜冠军
      then:
        - 页面展示一个来自 48 支参赛队候选池的国家或地区作为 2026 世界杯冠军猜测
        - 页面展示娱乐和非投注免责声明

    - id: SCN-002
      name: 系统不会返回非参赛队
      given:
        - world_cup_2026_team_pool contains the documented 48 participant teams
      when:
        - 用户点击猜冠军
      then:
        - 页面不得展示不在候选池中的国家或地区

    - id: SCN-003
      name: 候选池数量不正确时拒绝生成结果
      given:
        - world_cup_2026_team_pool contains 47 teams
      when:
        - 用户点击猜冠军
      then:
        - 页面不展示冠军猜测
        - 页面展示参赛队候选池配置错误

    - id: SCN-004
      name: 用户可以重复获得随机猜测
      given:
        - world_cup_2026_team_pool contains the documented 48 participant teams
      when:
        - 用户连续多次点击猜冠军
      then:
        - 每次返回结果都来自 48 支参赛队候选池
        - 系统不要求每次返回同一个国家或地区

    - id: SCN-005
      name: 用户模拟整届赛事直到冠军
      given:
        - world_cup_2026_team_pool contains the documented 48 participant teams
        - each group contains 4 teams
      when:
        - 用户点击重新模拟
      then:
        - 页面展示 72 场小组赛预测比分
        - 页面展示 12 个小组积分榜
        - 页面展示 32 强后的淘汰赛路径
        - 页面展示最终冠军

    - id: SCN-006
      name: 用户同步已完赛赛况后继续模拟未来赛程
      given:
        - world_cup_2026_team_pool contains the documented 48 participant teams
        - synced_match_results contains completed group-stage fixtures from the local snapshot
      when:
        - 用户点击同步赛况
      then:
        - 页面在对应小组赛场次展示同步真实比分
        - 同步真实比分的场次显示北京时间和“同步真实赛果”标识
        - 未完赛场次显示“模拟预测”标识
        - 小组积分榜基于同步真实比分和未完赛预测比分共同计算
        - 淘汰赛对阵和最终冠军基于更新后的积分榜继续模拟

    - id: SCN-007
      name: 用户打开页面时看到参赛队国旗和世界杯视觉装饰
      given:
        - world_cup_2026_team_pool contains the documented 48 participant teams
      when:
        - 用户打开冠军猜测网页
      then:
        - 冠军展示、积分榜和比赛对阵中的参赛队名称旁展示对应国旗图标
        - “2026 世界杯冠军猜想”标题背景低透明度展示本届世界杯招贴画
        - 浏览器图标和页面品牌标记展示大力神杯风格图标
        - 标题、说明文案和按钮保持可读且不被招贴画遮挡

  acceptance_criteria:
    - id: AC-001
      text: 需求文档必须按大洲列出 48 支 2026 世界杯参赛队。
      verifies:
        - RULE-001
        - RULE-004

    - id: AC-002
      text: 页面必须提供一个触发 2026 世界杯冠军猜测的主要操作。
      verifies:
        - RULE-002

    - id: AC-003
      text: 每次冠军猜测结果必须来自本需求文档列出的 48 支参赛队。
      verifies:
        - RULE-001
        - RULE-002
        - RULE-003

    - id: AC-004
      text: 当候选池缺失、数量不是 48 或名称重复时，系统必须拒绝生成结果并展示配置错误。
      verifies:
        - RULE-001
        - RULE-004

    - id: AC-005
      text: 用户重复点击猜冠军时，系统允许返回不同队伍，但每次结果都必须来自 48 支参赛队候选池。
      verifies:
        - RULE-002
        - RULE-005

    - id: AC-006
      text: 页面展示冠军猜测时，必须同时展示仅供娱乐、不保证准确、不构成投注建议的免责声明。
      verifies:
        - RULE-006

    - id: AC-007
      text: 运行时不得联网调用真实赛程、实时比分、赔率、排名、新闻或历史比赛外部数据源；同步赛况使用本地内置快照。
      verifies:
        - RULE-014

    - id: AC-008
      text: 系统必须为 12 个小组生成总计 72 场小组赛预测比分。
      verifies:
        - RULE-007
        - RULE-008

    - id: AC-009
      text: 系统必须根据预测比分生成小组积分榜，并选出 32 支晋级队伍。
      verifies:
        - RULE-009
        - RULE-010

    - id: AC-010
      text: 系统必须生成淘汰赛路径并最终展示唯一冠军。
      verifies:
        - RULE-011
        - RULE-012

    - id: AC-011
      text: 页面必须在“重新模拟”按钮左侧展示“同步赛况”按钮。
      verifies:
        - RULE-013

    - id: AC-012
      text: 点击同步赛况后，已完赛场次必须显示真实比分、北京时间和同步真实赛果标识，未完赛场次必须显示模拟预测标识。
      verifies:
        - RULE-014
        - RULE-015

    - id: AC-013
      text: 同步真实赛果必须改变积分榜，并通过 32 强资格和淘汰赛路径影响后续模拟。
      verifies:
        - RULE-016
        - RULE-017

    - id: AC-014
      text: 48 支参赛队必须都有国旗图标映射，且冠军、积分榜、比赛对阵展示队名时必须显示对应国旗图标。
      verifies:
        - RULE-018

    - id: AC-015
      text: 标题区域必须把 2026 世界杯招贴画作为低透明背景展示，前景标题、说明和操作按钮不得被遮挡。
      verifies:
        - RULE-019

    - id: AC-016
      text: 项目 favicon 和页面品牌标记必须使用大力神杯风格图标。
      verifies:
        - RULE-020

