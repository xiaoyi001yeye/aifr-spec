        - 伊朗
        - 伊拉克
        - 日本
        - 约旦
        - 卡塔尔
        - 沙特阿拉伯
        - 韩国
        - 乌兹别克斯坦
      CAF:
        - 阿尔及利亚
        - 佛得角
        - 刚果民主共和国
        - 埃及
        - 加纳
        - 科特迪瓦
        - 摩洛哥
        - 塞内加尔
        - 南非
        - 突尼斯
      CONCACAF:
        - 加拿大
        - 库拉索
        - 海地
        - 墨西哥
        - 巴拿马
        - 美国
      CONMEBOL:
        - 阿根廷
        - 巴西
        - 哥伦比亚
        - 厄瓜多尔
        - 巴拉圭
        - 乌拉圭
      OFC:
        - 新西兰
      UEFA:
        - 奥地利
        - 比利时
        - 波黑
        - 克罗地亚
        - 捷克
        - 英格兰
