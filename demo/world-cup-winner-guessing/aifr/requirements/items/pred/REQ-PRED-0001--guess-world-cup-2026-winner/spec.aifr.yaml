  risk:
    level: low
    reasons:
      - demo 版本不处理支付、个人敏感信息或外部系统写入。
      - 输出明确限定为娱乐性质，不保证准确且不构成投注建议。
      - 官方招贴画仅作为低透明背景装饰，页面不得暗示官方授权或官方预测。

  non_functional:
    performance:
      - 点击猜冠军后，页面应在 500ms 内展示结果或配置错误。
    reliability:
      - 参赛队候选池配置无效时不得展示上一次或部分生成的结果。
      - 同步赛况失败或快照为空时，页面必须保留可用的纯模拟结果并清晰说明未同步。
    security:
      - 参赛队名称应作为普通文本展示，避免脚本注入。
    accessibility:
      - 猜冠军按钮和结果区域应有可理解的标签。
    compliance:
      - 页面不得暗示投注建议、胜负保证、官方预测、官方授权或真实数据分析结论。

  open_questions:
    - 如果官方参赛队名称展示方式变化，是否需要同步更新本需求文档中的 participant_teams？
    - 是否需要在后续版本中精确实现官方 Annex C 的第三名晋级组合配对？
    - 是否需要在后续版本接入 FIFA 官方 API 或其他授权数据源，以替代本地同步快照？
    - 是否需要把城市、球场、裁判、观众人数等更多真实赛况字段也同步展示？
