aifr_spec:
  schema_version: "1.0.0"
  id: REQ-PRED-0001
  version: "1.1.0"
  title: 娱乐 2026 世界杯冠军猜测网页
  type: functional
  status: draft
  priority: medium

  identity:
    primary_domain: PRED
    domain_path: pred
    frozen_slug: guess-world-cup-2026-winner
    canonical_path: aifr/requirements/items/pred/REQ-PRED-0001--guess-world-cup-2026-winner/spec.aifr.yaml
    naming_standard_version: "1.0.0"

  lifecycle:
    created_at: "2026-06-23"
    updated_at: "2026-06-23"
    owner: demo
    reviewers:
      - product
      - engineering
      - qa

  versioning:
    change_type: minor
    previous_version: "1.0.0"
    supersedes: []
    superseded_by: null
    breaking_change: false
    change_summary: 增强版本：系统按小组赛对战顺序逐场猜比分，生成积分和淘汰赛路径，最终猜出冠军。

  revision_history:
    - version: "1.0.0"
      change_type: initial
      summary: 初始 2026 世界杯冠军猜测网页需求，候选池固定为需求文档列出的参赛队。
    - version: "1.1.0"
      change_type: minor
      summary: 新增整届赛事模拟过程：小组赛逐场比分、积分出线、淘汰赛路径和最终冠军。

  intent:
    user_goal: 用户想快速获得一个“哪个国家可能夺得 2026 世界杯冠军”的娱乐猜测。
    business_value: 提供轻量互动 demo，展示自我 grill 后如何把模糊需求转成边界清楚、可实现、可测试的 AIFR 需求。

  scope:
    in:
      - 提供一个简单网页，用户可以点击操作来模拟 2026 世界杯冠军归属。
      - 系统必须从本需求文档列出的 48 支 2026 世界杯参赛队和小组分组中生成整届赛事模拟。
      - 需求文档必须列出全部 48 支参赛队，并按大洲分组保存。
      - 系统必须按小组赛对战顺序逐场生成娱乐性质比分。
      - 系统必须根据模拟比分生成小组积分榜。
      - 系统必须从小组赛模拟结果中选出 32 强：每组前两名和 8 个成绩最好的小组第三名。
      - 系统必须继续模拟淘汰赛比分，直到生成最终冠军。
      - 页面必须展示小组赛比分、积分榜、淘汰赛路径和最终冠军。
      - 用户可以重复点击并获得新的随机猜测。
      - 页面必须展示“仅供娱乐，不保证准确，不构成投注建议”的免责声明或等价文案。
    out:
      - 运行时接入真实赛程、实时比分、赔率、排名、伤停、新闻或历史比赛数据库。
      - 从参赛队列表以外的国家或地区中生成冠军猜测。
      - 声称结果是真实预测、投注建议、官方推荐或数据分析结论。
      - 使用 FIFA 官方 logo、赛事视觉资产或未经授权的官方品牌包装。
      - 要求用户输入国家、球队、偏好或个人信息。
      - 保存用户历史猜测记录、账号信息或行为分析数据。
      - 精确复刻官方 Annex C 中所有第三名晋级组合对应的淘汰赛配对。
      - 解释被选中国家夺冠的真实原因。

  actors:
    primary:
      - user
    secondary:
      - winner_guess_page
      - winner_guess_generator
      - world_cup_2026_team_pool

  domain_terms:
    world_cup_2026_team_pool: 本需求文档列出的 48 支 2026 世界杯参赛队集合，是冠军猜测的唯一候选来源。
    participant_team: 2026 世界杯参赛队列表中的一个国家或地区展示名称。
    group_stage_fixture_order: 四队小组的对战顺序：1v2、3v4、1v3、4v2、4v1、2v3。
    predicted_score: 系统为一场比赛生成的娱乐性质比分。
    simulated_standings: 根据预测比分计算出的积分、净胜球和进球数排序。
    knockout_bracket: 从模拟出线队伍生成的娱乐性质淘汰赛路径。
    winner_guess: 系统随机选中的 2026 世界杯冠军猜测国家或地区。
    entertainment_disclaimer: 说明结果仅供娱乐、不保证准确、不构成投注建议的文案。

  preconditions:
    - 用户已经打开冠军猜测网页。
    - 系统已加载本需求文档定义的 2026 世界杯参赛队列表。

  source_references:
    - name: 2026 FIFA World Cup teams list
      url: https://en.wikipedia.org/wiki/2026_FIFA_World_Cup
      retrieved_at: "2026-06-23"
      note: 该页面列出 2026 世界杯 48 支参赛队；赛事正在进行，外部页面信息可能继续变化。
    - name: 2026 FIFA World Cup group and match schedule
      url: https://en.wikipedia.org/wiki/2026_FIFA_World_Cup
      retrieved_at: "2026-06-23"
      note: 该页面说明 12 个小组、48 队赛制、每组对战顺序和淘汰赛阶段。

  participant_teams:
